name: Build GPU Screen Recorder with Mic Icon

on:
  schedule:
    # Ejecutar cada 6 horas para detectar nuevas versiones
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Permitir ejecución manual

permissions:
  contents: write
  packages: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should-build: ${{ steps.check.outputs.should-build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest version from Arch PKGBUILD
        id: get-version
        run: |
          # Descargar el PKGBUILD oficial de Arch
          curl -s "https://gitlab.archlinux.org/archlinux/packaging/packages/gpu-screen-recorder/-/raw/main/PKGBUILD?ref_type=heads" > PKGBUILD.official
          
          # Extraer la versión (pkgver=)
          VERSION=$(grep -Po '^pkgver=\K.*' PKGBUILD.official)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Versión encontrada: $VERSION"
          
          # Guardar la versión actual publicada
          if [ -f "last_version.txt" ]; then
            LAST_VERSION=$(cat last_version.txt)
            echo "last_version=$LAST_VERSION" >> $GITHUB_OUTPUT
          else
            echo "last_version=" >> $GITHUB_OUTPUT
          fi

      - name: Check if new version
        id: check
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          LAST_VERSION="${{ steps.get-version.outputs.last_version }}"
          
          if [ "$VERSION" != "$LAST_VERSION" ] && [ -n "$VERSION" ]; then
            echo "should-build=true" >> $GITHUB_OUTPUT
            echo "Nueva versión detectada: $VERSION (anterior: $LAST_VERSION)"
          else
            echo "should-build=false" >> $GITHUB_OUTPUT
            echo "No hay nueva versión (actual: $VERSION)"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Arch Linux build environment
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            meson \
            cmake \
            ffmpeg \
            libpulse \
            libva \
            libdrm \
            vulkan-headers \
            libx11 \
            libxcomposite \
            libxrandr \
            libxfixes \
            libxdamage \
            libglvnd \
            libcap \
            wayland \
            libpipewire \
            dbus \
            libjpeg-turbo \
            nlohmann-json \
            python \
            gcc \
            ninja
          # Crear usuario no root para makepkg
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R builder:builder /__w

      - name: Get latest version
        id: version
        run: |
          curl -s "https://gitlab.archlinux.org/archlinux/packaging/packages/gpu-screen-recorder/-/raw/main/PKGBUILD?ref_type=heads" > PKGBUILD.official
          VERSION=$(grep -Po '^pkgver=\K.*' PKGBUILD.official)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Compilando versión: $VERSION"

      - name: Build package with patch
        run: |
          # Crear directorio de trabajo
          mkdir -p /home/builder/build
          cd /home/builder/build
          
          # Descargar el PKGBUILD oficial
          curl -s "https://gitlab.archlinux.org/archlinux/packaging/packages/gpu-screen-recorder/-/raw/main/PKGBUILD?ref_type=heads" > PKGBUILD
          
          # Modificar el PKGBUILD para añadir el parche
          cat >> /tmp/patch_content << 'EOF'
          # === PARCHE PARA RESTAURAR ÍCONO DEL MICRÓFONO ===
          # Aplicar revert del commit que eliminó la funcionalidad
          prepare() {
            cd "$srcdir/$pkgname"
            # Revertir el commit específico
            git revert --no-commit ff030ba63f8d109618cbb69d759a5ce4c3cd802f || true
          }
          EOF
          
          # Insertar la función prepare() después de las variables
          sed -i '/^build()/i '"$(cat /tmp/patch_content)" PKGBUILD
          
          # Añadir optimizaciones x86-64-v3 (como CachyOS)
          sed -i 's/meson setup build/meson setup build -Dc_args="-march=x86-64-v3" -Dcpp_args="-march=x86-64-v3"/' PKGBUILD
          
          # Cambiar el nombre del paquete para evitar conflictos
          sed -i 's/^pkgname=gpu-screen-recorder/pkgname=gpu-screen-recorder-mic/' PKGBUILD
          
          # Construir como usuario builder
          chown -R builder:builder .
          sudo -u builder makepkg -s --noconfirm
          
          # Copiar los paquetes compilados
          cp *.pkg.tar.zst /__w/_temp/ || true
          cp *.pkg.tar.zst /__w/_temp/
          
          # Guardar nombre del archivo
          PKG_FILE=$(ls *.pkg.tar.zst 2>/dev/null | head -1)
          echo "pkg_file=$PKG_FILE" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-screen-recorder-mic
          path: /home/builder/build/*.pkg.tar.zst

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: GPU Screen Recorder Mic v${{ steps.version.outputs.version }}
          files: /home/builder/build/*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save version
        run: echo "${{ steps.version.outputs.version }}" > last_version.txt

      - name: Commit version file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update version to ${{ steps.version.outputs.version }}"
          file_pattern: last_version.txt