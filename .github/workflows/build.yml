name: Build GPU Screen Recorder with Mic Icon

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should-build: ${{ steps.check.outputs.should-build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get latest version from Arch PKGBUILD
        id: get-version
        run: |
          # Descargar el PKGBUILD oficial de Arch
          curl -s "https://gitlab.archlinux.org/archlinux/packaging/packages/gpu-screen-recorder/-/raw/main/PKGBUILD?ref_type=heads" > PKGBUILD.official
          
          # Extraer la versión (pkgver=)
          VERSION=$(grep -Po '^pkgver=\K.*' PKGBUILD.official)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Versión encontrada: $VERSION"
          
          # Leer la versión anterior si existe
          if [ -f "last_version.txt" ]; then
            LAST_VERSION=$(cat last_version.txt)
            echo "last_version=$LAST_VERSION" >> $GITHUB_OUTPUT
          else
            echo "last_version=" >> $GITHUB_OUTPUT
          fi

      - name: Check if new version
        id: check
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          LAST_VERSION="${{ steps.get-version.outputs.last_version }}"
          
          if [ -n "$VERSION" ] && [ "$VERSION" != "$LAST_VERSION" ]; then
            echo "should-build=true" >> $GITHUB_OUTPUT
            echo "Nueva versión detectada: $VERSION (anterior: $LAST_VERSION)"
          else
            echo "should-build=false" >> $GITHUB_OUTPUT
            echo "No hay nueva versión (actual: $VERSION)"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup build environment
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            meson \
            cmake \
            ffmpeg \
            libpulse \
            libva \
            libdrm \
            vulkan-headers \
            libx11 \
            libxcomposite \
            libxrandr \
            libxfixes \
            libxdamage \
            libglvnd \
            libcap \
            wayland \
            libpipewire \
            dbus \
            libjpeg-turbo \
            nlohmann-json \
            python \
            gcc \
            ninja
          
          # Crear usuario no root para makepkg
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Get latest version
        id: version
        run: |
          curl -s "https://gitlab.archlinux.org/archlinux/packaging/packages/gpu-screen-recorder/-/raw/main/PKGBUILD?ref_type=heads" > PKGBUILD.official
          VERSION=$(grep -Po '^pkgver=\K.*' PKGBUILD.official)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Compilando versión: $VERSION"

      - name: Build package with patch
        id: build
        run: |
          # Crear directorio de trabajo
          mkdir -p /home/builder/build
          cd /home/builder/build
          
          # Descargar el PKGBUILD oficial
          curl -s "https://gitlab.archlinux.org/archlinux/packaging/packages/gpu-screen-recorder/-/raw/main/PKGBUILD?ref_type=heads" > PKGBUILD
          
          # NO cambiar el nombre del paquete (mantener gpu-screen-recorder)
          # sed -i 's/^pkgname=.../' NO SE HACE
          
          # Cambiar pkgrel para que sea diferente al oficial
          # El oficial usa pkgrel=1, nosotros usamos pkgrel=1.custom o similar
          sed -i 's/^pkgrel=1/pkgrel=1.custom/' PKGBUILD
          
          # Añadir provides y conflicts (opcional pero recomendado)
          sed -i '/^pkgrel=/a provides=("gpu-screen-recorder")\nconflicts=("gpu-screen-recorder")' PKGBUILD
          
          # Añadir optimizaciones x86-64-v3
          sed -i 's/meson setup build/meson setup build -Dc_args="-march=x86-64-v3" -Dcpp_args="-march=x86-64-v3"/' PKGBUILD
          
          # Crear la función prepare()
          cat > /tmp/prepare_func << 'EOF'
          
          prepare() {
            cd "$srcdir/gpu-screen-recorder"
            echo "Revertiendo commit ff030ba63f8d109618cbb69d759a5ce4c3cd802f..."
            git revert --no-commit ff030ba63f8d109618cbb69d759a5ce4c3cd802f || echo "El revert falló, continuando..."
          }
          EOF
          
          # Insertar la función prepare() antes de build()
          awk -v prep="$(cat /tmp/prepare_func)" '
            /^build\(\)/ {
              print prep
              print ""
            }
            { print }
          ' PKGBUILD > PKGBUILD.tmp
          mv PKGBUILD.tmp PKGBUILD
          
          # Verificar que el PKGBUILD quedo bien
          echo "=== PKGBUILD modificado ==="
          grep -E "pkgname|pkgver|pkgrel|prepare|build" PKGBUILD | head -20
          
          # Construir como usuario builder
          chown -R builder:builder .
          sudo -u builder makepkg -s --noconfirm
          
          # Listar paquetes generados
          ls -la *.pkg.tar.zst
          
          # Guardar nombre del archivo
          PKG_FILE=$(ls *.pkg.tar.zst 2>/dev/null | head -1)
          echo "pkg_file=$PKG_FILE" >> $GITHUB_OUTPUT
          
          # Copiar para el release
          mkdir -p /tmp/artifacts
          cp *.pkg.tar.zst /tmp/artifacts/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-screen-recorder-mic
          path: /tmp/artifacts/*.pkg.tar.zst

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: GPU Screen Recorder Mic v${{ steps.version.outputs.version }}
          files: /tmp/artifacts/*.pkg.tar.zst
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save version
        run: echo "${{ steps.version.outputs.version }}" > last_version.txt

      - name: Commit version file
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update version to ${{ steps.version.outputs.version }}"
          file_pattern: last_version.txt