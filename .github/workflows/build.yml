name: Build GPU Screen Recorder with Mic Icon

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should-build: ${{ steps.check.outputs.should-build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get latest version from Arch PKGBUILD
        id: get-version
        run: |
          curl -s "https://gitlab.archlinux.org/archlinux/packaging/packages/gpu-screen-recorder/-/raw/main/PKGBUILD?ref_type=heads" > PKGBUILD.official
          VERSION=$(grep -Po '^pkgver=\K.*' PKGBUILD.official)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Versión encontrada: $VERSION"
          
          if [ -f "last_version.txt" ]; then
            LAST_VERSION=$(cat last_version.txt)
            echo "last_version=$LAST_VERSION" >> $GITHUB_OUTPUT
          else
            echo "last_version=" >> $GITHUB_OUTPUT
          fi

      - name: Check if new version
        id: check
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          LAST_VERSION="${{ steps.get-version.outputs.last_version }}"
          
          if [ -n "$VERSION" ] && [ "$VERSION" != "$LAST_VERSION" ]; then
            echo "should-build=true" >> $GITHUB_OUTPUT
            echo "Nueva versión detectada: $VERSION (anterior: $LAST_VERSION)"
          else
            echo "should-build=false" >> $GITHUB_OUTPUT
            echo "No hay nueva versión (actual: $VERSION)"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup build environment
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            meson \
            cmake \
            ffmpeg \
            libpulse \
            libva \
            libdrm \
            vulkan-headers \
            libx11 \
            libxcomposite \
            libxrandr \
            libxfixes \
            libxdamage \
            libglvnd \
            libcap \
            wayland \
            libpipewire \
            dbus \
            libjpeg-turbo \
            nlohmann-json \
            python \
            gcc \
            ninja
          
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Get latest version
        id: version
        run: |
          curl -s "https://gitlab.archlinux.org/archlinux/packaging/packages/gpu-screen-recorder/-/raw/main/PKGBUILD?ref_type=heads" > PKGBUILD.official
          VERSION=$(grep -Po '^pkgver=\K.*' PKGBUILD.official)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Compilando versión: $VERSION"

      - name: Build package with patch
        run: |
          mkdir -p /home/builder/build
          cd /home/builder/build
          
          curl -s "https://gitlab.archlinux.org/archlinux/packaging/packages/gpu-screen-recorder/-/raw/main/PKGBUILD?ref_type=heads" > PKGBUILD
          
          # Cambiar pkgrel a un número más alto
          sed -i 's/^pkgrel=1/pkgrel=999/' PKGBUILD
          
          # Añadir optimizaciones x86-64-v3
          sed -i 's/meson setup build/meson setup build -Dc_args="-march=x86-64-v3" -Dcpp_args="-march=x86-64-v3"/' PKGBUILD
          
          # Añadir prepare() function
          cat > /tmp/prepare_func << 'EOF'
          
          prepare() {
            cd "$srcdir/gpu-screen-recorder"
            echo "Revertiendo commit ff030ba63f8d109618cbb69d759a5ce4c3cd802f..."
            git revert --no-commit ff030ba63f8d109618cbb69d759a5ce4c3cd802f || echo "El revert falló, continuando..."
          }
          EOF
          
          awk -v prep="$(cat /tmp/prepare_func)" '
            /^build\(\)/ {
              print prep
              print ""
            }
            { print }
          ' PKGBUILD > PKGBUILD.tmp
          mv PKGBUILD.tmp PKGBUILD
          
          chown -R builder:builder .
          sudo -u builder makepkg -s --noconfirm
          
          mkdir -p /tmp/artifacts
          cp *.pkg.tar.zst /tmp/artifacts/
          
          # Guardar la versión para el siguiente job
          echo "${{ steps.version.outputs.version }}" > /tmp/version.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-screen-recorder-package
          path: /tmp/artifacts/*.pkg.tar.zst

      - name: Upload version file
        uses: actions/upload-artifact@v4
        with:
          name: version-info
          path: /tmp/version.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: GPU Screen Recorder v${{ steps.version.outputs.version }} (with mic icon)
          files: /tmp/artifacts/*.pkg.tar.zst
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-version:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download version file
        uses: actions/download-artifact@v4
        with:
          name: version-info
          path: /tmp

      - name: Update last_version.txt
        run: |
          VERSION=$(cat /tmp/version.txt)
          echo "$VERSION" > last_version.txt
          echo "Actualizado last_version.txt con versión: $VERSION"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update last_version.txt to ${{ needs.build.outputs.version }}"
          file_pattern: last_version.txt
          branch: main