name: Build GPU Screen Recorder with Mic Icon

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      current_version: ${{ steps.version.outputs.current_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies (lightweight)
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Get latest version from Arch PKGBUILD
        id: version
        run: |
          curl -s "https://gitlab.archlinux.org/archlinux/packaging/packages/gpu-screen-recorder/-/raw/main/PKGBUILD?ref_type=heads" > PKGBUILD.official
          VERSION=$(grep -Po '^pkgver=\K.*' PKGBUILD.official)
          echo "current_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Versión actual en Arch: $VERSION"

      - name: Get latest release from GitHub
        id: release
        run: |
          RELEASE_RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" 2>/dev/null || echo '{"tag_name":null}')
          
          LATEST_RELEASE=$(echo "$RELEASE_RESPONSE" | jq -r '.tag_name // ""')
          if [ -n "$LATEST_RELEASE" ] && [ "$LATEST_RELEASE" != "null" ]; then
            LATEST_VERSION=${LATEST_RELEASE#v}
            echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
            echo "Último release en GitHub: $LATEST_VERSION"
          else
            echo "latest_version=" >> $GITHUB_OUTPUT
            echo "No hay releases previos"
          fi

      - name: Check if build needed
        id: check
        run: |
          CURRENT="${{ steps.version.outputs.current_version }}"
          LATEST="${{ steps.release.outputs.latest_version }}"
          
          if [ -z "$LATEST" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "No hay releases previos. Se construirá versión $CURRENT"
          elif [ "$CURRENT" != "$LATEST" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Nueva versión detectada: $CURRENT (anterior: $LATEST)"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "Ya está actualizado: $CURRENT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup build environment
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            meson \
            cmake \
            ffmpeg \
            libpulse \
            libva \
            libdrm \
            vulkan-headers \
            libx11 \
            libxcomposite \
            libxrandr \
            libxfixes \
            libxdamage \
            libglvnd \
            libcap \
            wayland \
            libpipewire \
            dbus \
            libjpeg-turbo \
            nlohmann-json \
            python \
            gcc \
            ninja
          
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Get current version
        id: version
        run: |
          VERSION="${{ needs.check-version.outputs.current_version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Compilando versión: $VERSION"

      - name: Build package with patch
        run: |
          mkdir -p /home/builder/build
          cd /home/builder/build
          
          curl -s "https://gitlab.archlinux.org/archlinux/packaging/packages/gpu-screen-recorder/-/raw/main/PKGBUILD?ref_type=heads" > PKGBUILD
          
          # Cambiar pkgrel a un número más alto
          sed -i 's/^pkgrel=1/pkgrel=999/' PKGBUILD
          
          # Añadir optimizaciones x86-64-v3
          sed -i 's/meson setup build/meson setup build -Dc_args="-march=x86-64-v3" -Dcpp_args="-march=x86-64-v3"/' PKGBUILD
          
          # Añadir prepare() function
          cat > /tmp/prepare_func << 'EOF'
          
          prepare() {
            cd "$srcdir/gpu-screen-recorder"
            echo "Revertiendo commit ff030ba63f8d109618cbb69d759a5ce4c3cd802f..."
            git revert --no-commit ff030ba63f8d109618cbb69d759a5ce4c3cd802f || echo "El revert falló, continuando..."
          }
          EOF
          
          awk -v prep="$(cat /tmp/prepare_func)" '
            /^build\(\)/ {
              print prep
              print ""
            }
            { print }
          ' PKGBUILD > PKGBUILD.tmp
          mv PKGBUILD.tmp PKGBUILD
          
          chown -R builder:builder .
          sudo -u builder makepkg -s --noconfirm
          
          mkdir -p /tmp/artifacts
          cp *.pkg.tar.zst /tmp/artifacts/

      - name: Create repo database
        run: |
          cd /tmp/artifacts
          
          # Crear la base de datos del repositorio con nombre gsr-mic (más corto)
          repo-add gsr-mic.db.tar.zst *.pkg.tar.zst
          
          # Crear enlaces simbólicos para compatibilidad
          if [ -f "gsr-mic.db.tar.zst" ]; then
            ln -sf gsr-mic.db.tar.zst gsr-mic.db
          fi
          
          if [ -f "gsr-mic.files.tar.zst" ]; then
            ln -sf gsr-mic.files.tar.zst gsr-mic.files
          fi
          
          echo "Repositorio creado con éxito"
          ls -la

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repo-files
          path: /tmp/artifacts/*

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: GPU Screen Recorder v${{ steps.version.outputs.version }} (with mic icon)
          files: /tmp/artifacts/*.pkg.tar.zst
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-repo-branch:
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo branch
        uses: actions/checkout@v4
        with:
          ref: repo
          fetch-depth: 1

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: repo-files
          path: ./repo

      - name: Update repo branch
        run: |
          # Configurar git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Limpiar archivos antiguos del repositorio
          find . -type f \( -name "*.db" -o -name "*.db.tar.zst" -o -name "*.files" -o -name "*.files.tar.zst" -o -name "*.pkg.tar.zst" \) -delete
          
          # Copiar los nuevos archivos
          cp -r repo/* .
          rm -rf repo
          
          # Crear README actualizado
          cat > README.md << 'EOF'
          # GPU Screen Recorder - Repositorio Pacman
          
          Este branch contiene los archivos del repositorio para pacman.
          
          ## Añadir este repositorio
          
          Agrega la siguiente línea a `/etc/pacman.conf` **ANTES** que `cachyos-extra-v3`:
          
          ```ini
          [gsr-mic]
          SigLevel = Optional TrustAll
          Server = https://raw.githubusercontent.com/MagmaSKV/GpuScreenRecorder-KDE_Mic_Revert/repo