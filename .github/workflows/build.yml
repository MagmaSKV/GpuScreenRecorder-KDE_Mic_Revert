name: Build GPU Screen Recorder with Mic Icon

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      current_version: ${{ steps.version.outputs.current_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      - name: Get latest version from Arch PKGBUILD
        id: version
        run: |
          curl -s "https://gitlab.archlinux.org/archlinux/packaging/packages/gpu-screen-recorder/-/raw/main/PKGBUILD?ref_type=heads" > PKGBUILD.official
          VERSION=$(grep -Po '^pkgver=\K.*' PKGBUILD.official)
          echo "current_version=$VERSION" >> $GITHUB_OUTPUT
          echo "Versión actual en Arch: $VERSION"

      - name: Get latest release from GitHub
        id: release
        run: |
          RELEASE_RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" 2>/dev/null || echo '{"tag_name":null}')
          
          LATEST_RELEASE=$(echo "$RELEASE_RESPONSE" | jq -r '.tag_name // ""')
          if [ -n "$LATEST_RELEASE" ] && [ "$LATEST_RELEASE" != "null" ]; then
            LATEST_VERSION=${LATEST_RELEASE#v}
            echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
            echo "Último release en GitHub: $LATEST_VERSION"
          else
            echo "latest_version=" >> $GITHUB_OUTPUT
          fi

      - name: Check if build needed
        id: check
        run: |
          CURRENT="${{ steps.version.outputs.current_version }}"
          LATEST="${{ steps.release.outputs.latest_version }}"
          
          if [ -z "$LATEST" ] || [ "$CURRENT" != "$LATEST" ]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "Construyendo versión: $CURRENT"
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
            echo "Ya está actualizado: $CURRENT"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup build environment
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            meson \
            cmake \
            ffmpeg \
            libpulse \
            libva \
            libdrm \
            vulkan-headers \
            libx11 \
            libxcomposite \
            libxrandr \
            libxfixes \
            libxdamage \
            libglvnd \
            libcap \
            wayland \
            libpipewire \
            dbus \
            libjpeg-turbo \
            nlohmann-json \
            python \
            gcc \
            ninja
          
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Get current version
        id: version
        run: |
          VERSION="${{ needs.check-version.outputs.current_version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Compilando versión: $VERSION"

      - name: Build package with patch
        run: |
          mkdir -p /home/builder/build
          cd /home/builder/build
          
          curl -s "https://gitlab.archlinux.org/archlinux/packaging/packages/gpu-screen-recorder/-/raw/main/PKGBUILD?ref_type=heads" > PKGBUILD
          
          # Cambiar pkgver a usar sufijo .mic
          sed -i 's/^pkgrel=1/pkgrel=1.mic/' PKGBUILD
          
          # Añadir optimizaciones x86-64-v3
          sed -i 's/meson setup build/meson setup build -Dc_args="-march=x86-64-v3" -Dcpp_args="-march=x86-64-v3"/' PKGBUILD
          
          # Añadir prepare() function
          cat > /tmp/prepare_func << 'EOF'
          
          prepare() {
            cd "$srcdir/gpu-screen-recorder"
            echo "Revertiendo commit ff030ba63f8d109618cbb69d759a5ce4c3cd802f..."
            git revert --no-commit ff030ba63f8d109618cbb69d759a5ce4c3cd802f || echo "El revert falló, continuando..."
          }
          EOF
          
          awk -v prep="$(cat /tmp/prepare_func)" '
            /^build\(\)/ {
              print prep
              print ""
            }
            { print }
          ' PKGBUILD > PKGBUILD.tmp
          mv PKGBUILD.tmp PKGBUILD
          
          chown -R builder:builder .
          sudo -u builder makepkg -s --noconfirm
          
          mkdir -p /tmp/artifacts
          cp *.pkg.tar.zst /tmp/artifacts/
          
          # Renombrar para que tenga el sufijo .mic (por si acaso)
          for f in /tmp/artifacts/*.pkg.tar.zst; do
            mv "$f" "$(echo $f | sed 's/-999-/-1.mic-/')"
          done

      - name: Create repo database
        run: |
          cd /tmp/artifacts
          # Crear base de datos del repositorio
          repo-add gpu-screen-recorder.db.tar.gz *.pkg.tar.zst
          repo-add gpu-screen-recorder.files.tar.gz *.pkg.tar.zst
          ls -la

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/artifacts/

      - name: Create Release (backup)
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: GPU Screen Recorder v${{ steps.version.outputs.version }} (with mic icon)
          files: /tmp/artifacts/*.pkg.tar.zst
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4